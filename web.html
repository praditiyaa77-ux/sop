<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout Utama */
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 90px);
            padding: 8px;
            gap: 8px;
        }

        /* Sidebar Kiri */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bg-card {
            background-color: #121212;
            border-radius: 8px;
            padding: 20px;
        }

        .menu-nav ul {
            list-style: none;
        }

        .menu-nav li {
            margin-bottom: 20px;
        }

        .menu-nav li:last-child {
            margin-bottom: 0;
        }

        .menu-nav a {
            color: #b3b3b3;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: color 0.2s;
        }

        .menu-nav a:hover, .menu-nav .active a {
            color: #ffffff;
        }

        .library {
            flex: 1;
            overflow-y: auto;
        }

        .lib-header {
            display: flex;
            justify-content: space-between;
            color: #b3b3b3;
            margin-bottom: 20px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        .playlist-item:hover {
            background-color: #1a1a1a;
        }

        .playlist-img {
            width: 48px;
            height: 48px;
            background-color: #282828;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Konten Utama (Kanan) */
        .main-content {
            flex: 1;
            background: linear-gradient(to bottom, #222222, #121212);
            border-radius: 8px;
            overflow-y: auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-buttons button {
            background-color: rgba(0,0,0,0.7);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            margin-right: 8px;
        }

        .user-badge {
            background-color: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        /* Bagian Card Musik */
        .section-title {
            font-size: 24px;
            margin-bottom: 16px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .music-card {
            background-color: #181818;
            padding: 16px;
            border-radius: 8px;
            transition: background-color 0.3s;
            cursor: pointer;
            position: relative;
        }

        .music-card:hover {
            background-color: #282828;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1;
            background-color: #282828;
            border-radius: 6px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #aaa;
            position: relative;
        }

        /* Tombol Play saat Hover */
        .play-btn-hover {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: #1db954;
            color: black;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .music-card:hover .play-btn-hover {
            opacity: 1;
            transform: translateY(0);
        }

        .music-card h4 {
            font-size: 16px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-card p {
            color: #b3b3b3;
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Player Kontrol Bawah */
        .now-playing-bar {
            height: 90px;
            background-color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 30%;
        }

        .track-img {
            width: 56px;
            height: 56px;
            background-color: #282828;
            border-radius: 4px;
        }

        .track-detail h5 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .track-detail p {
            color: #b3b3b3;
            font-size: 11px;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 40%;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 24px;
            color: #b3b3b3;
            font-size: 16px;
        }

        .control-buttons i:hover {
            color: #ffffff;
            cursor: pointer;
        }

        .play-main {
            background-color: #ffffff;
            color: #000000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .play-main:hover {
            transform: scale(1.05);
        }

        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            color: #b3b3b3;
            font-size: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background-color: #4f4f4f;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-current {
            width: 30%;
            height: 100%;
            background-color: #ffffff;
            border-radius: 2px;
        }

        .progress-bar:hover .progress-current {
            background-color: #1db954;
        }

        .volume-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 30%;
            justify-content: flex-end;
            color: #b3b3b3;
        }

        .volume-bar {
            width: 100px;
            height: 4px;
            background-color: #4f4f4f;
            border-radius: 2px;
        }

        .volume-current {
            width: 70%;
            height: 100%;
            background-color: #ffffff;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Sidebar Kiri -->
        <div class="sidebar">
            <div class="bg-card menu-nav">
                <ul>
                    <li class="active"><a href="#"><i class="fa-solid fa-house"></i> Home</a></li>
                    <li><a href="#"><i class="fa-solid fa-magnifying-glass"></i> Search</a></li>
                </ul>
            </div>
            
            <div class="bg-card library">
                <div class="lib-header">
                    <span><i class="fa-solid fa-book"></i> Your Library</span>
                    <i class="fa-solid fa-plus"></i>
                </div>
                <!-- Daftar Playlist item -->
                <div class="playlist-item">
                    <div class="playlist-img"><i class="fa-solid fa-music"></i></div>
                    <div>
                        <h4>My Playlist #1</h4>
                        <p style="color: #b3b3b3; font-size: 14px;">Playlist • Kamu</p>
                    </div>
                </div>
                <div class="playlist-item">
                    <div class="playlist-img"><i class="fa-solid fa-heart" style="color: #1db954;"></i></div>
                    <div>
                        <h4>Liked Songs</h4>
                        <p style="color: #b3b3b3; font-size: 14px;">Playlist • 142 lagu</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Konten Utama -->
        <div class="main-content">
